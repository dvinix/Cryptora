services:
  - type: web
    name: cryptora-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cryptora-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend-url.vercel.app"]'
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: Cryptora
      - key: VERSION
        value: 1.0.0
      - key: MAX_CONTENT_SIZE
        value: 1000000
      - key: MAX_ALIAS_LENGTH
        value: 100
      - key: MIN_ALIAS_LENGTH
        value: 1
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_PER_MINUTE
        value: 60

databases:
  - name: cryptora-db
    databaseName: cryptora_db
    user: cryptora_user
    region: oregon
    plan: free
