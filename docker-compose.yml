version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptora_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootselmon
      POSTGRES_DB: cryptora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptora_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:rootselmon@postgres:5432/cryptora
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
